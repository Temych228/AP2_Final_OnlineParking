services:
  postgres:
    image: postgres:16-alpine
    container_name: parking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - parking_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: parking-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - parking_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: parking-nats
    restart: unless-stopped
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - parking_net

  api-gateway:
    image: nginx:1.27-alpine
    container_name: api-gateway
    restart: unless-stopped
    volumes:
      - ./services/api-gateway/nginx.conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/api-gateway/web:/usr/share/nginx/html:ro
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - user-service
      - notification-service
      - booking-service
      - parking-service
      - payment-service
    networks:
      - parking_net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: parking-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - parking_net
    depends_on:
      - node-exporter

  grafana:
    image: grafana/grafana:11.3.0
    container_name: parking-grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    networks:
      - parking_net
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: parking-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - parking_net

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    env_file:
      - ./services/user-service/.env
    environment:
      APP_PORT: 8081
      GRPC_PORT: 9091
      METRICS_PORT: 9201
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      NATS_URL: nats://nats:4222
    ports:
      - "8081:8081"
      - "9091:9091"
      - "9201:9201"
    networks:
      - parking_net

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    env_file:
      - ./services/auth-service/.env
    environment:
      APP_PORT: 8082
      GRPC_PORT: 9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 1
      NATS_URL: nats://nats:4222
    ports:
      - "8082:8082"
      - "9092:9092"
    networks:
      - parking_net

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    env_file:
      - ./services/notification-service/.env
    environment:
      HTTP_PORT: 8083
      GRPC_PORT: 9093
      METRICS_PORT: 9203
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 2
      NATS_URL: nats://nats:4222
    ports:
      - "8083:8083"
      - "9093:9093"
      - "9203:9203"
    networks:
      - parking_net

  parking-service:
    build:
      context: ./services/parking-service
      dockerfile: Dockerfile
    container_name: parking-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./services/parking-service/.env
    environment:
      HTTP_PORT: 8085
      GRPC_PORT: 9095
      DB_PARKING: postgres://parking:parking@postgres:5432/parking_service?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 4
      REDIS_PASSWORD: ""
    ports:
      - "8085:8085"
      - "9095:9095"
    networks:
      - parking_net

  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    container_name: booking-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      user-service:
        condition: service_started
      parking-service:
        condition: service_started
    env_file:
      - ./services/booking-service/.env
    environment:
      APP_PORT: 8084
      GRPC_PORT: 9094
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: parking
      DB_PASSWORD: parking
      DB_NAME: booking_service
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 3
      NATS_URL: nats://nats:4222
      USER_GRPC_ADDR: user-service:9091
      PARKING_GRPC_ADDR: parking-service:9095
      PARKING_HTTP_URL: http://parking-service:8085
    ports:
      - "8084:8084"
      - "9094:9094"
    networks:
      - parking_net

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      booking-service:
        condition: service_started
      parking-service:
        condition: service_started
      user-service:
        condition: service_started
    env_file:
      - ./services/payment-service/.env
    environment:
      HTTP_PORT: 8086
      GRPC_PORT: 9096
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: parking
      DB_PASSWORD: parking
      DB_NAME: payment_service
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 5
      REDIS_PASSWORD: ""
      BOOKING_SERVICE_URL: http://booking-service:8084
      PARKING_SERVICE_URL: http://parking-service:8085
      USER_SERVICE_URL: http://user-service:8081
      NATS_URL: nats://nats:4222
    ports:
      - "8086:8086"
      - "9096:9096"
    networks:
      - parking_net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  parking_net:
    driver: bridge